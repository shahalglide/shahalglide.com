<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShahalGlide</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ---------------- BASE ---------------- */
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: radial-gradient(circle at 50% 20%, #0a0a0a, #000);
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  color: #eaeaea;
}

/* CANVAS */
canvas {
  position: fixed;
  top:0; left:0;
  width:100%;
  height:100%;
}

/* CONTENT */
.container {
  position: absolute;
  width:100%;
  top:50%;
  transform: translateY(-50%);
  text-align:center;
  padding: 0 20px;
  pointer-events:none;
}

/* TEXT */
.title {
  font-size: clamp(28px, 6vw, 60px);
  font-weight:600;
  letter-spacing: 2px;
  opacity:0;
}

.subtitle {
  margin-top:12px;
  font-size: clamp(14px, 3.5vw, 18px);
  color:#9ca3af;
  opacity:0;
}

/* PROGRESS */
.progress {
  margin:40px auto 0;
  width:100px;
  height:100px;
  position:relative;
  opacity:0;
}

.progress svg {
  transform: rotate(-90deg);
}

.progress circle {
  fill:none;
  stroke-width:2;
  stroke:#333;
}

.progress .active {
  stroke:#eaeaea;
  stroke-dasharray:314;
  stroke-dashoffset:314;
  animation: draw 2s ease forwards;
}

@keyframes draw {
  to { stroke-dashoffset:0; }
}

/* IDLE LOOP */
.idle .active {
  animation: spin 8s linear infinite;
  stroke-dashoffset:0;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* BLUR */
.blur {
  filter: blur(12px);
}

/* FADE */
.show {
  opacity:1;
  transition: all 1.2s ease;
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="container" id="ui">
  <div class="title" id="title">ShahalGlide</div>
  <div class="subtitle" id="subtitle">Designed to move better. Built to feel right.</div>

  <div class="progress" id="progress">
    <svg width="100" height="100">
      <circle cx="50" cy="50" r="50"></circle>
      <circle cx="50" cy="50" r="50" class="active"></circle>
    </svg>
  </div>
</div>

<script>

/* ---------------- CANVAS PARTICLE SYSTEM ---------------- */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* CREATE TEXT MAP */
function getTextPoints(text) {
  const off = document.createElement("canvas");
  const octx = off.getContext("2d");

  off.width = canvas.width;
  off.height = canvas.height;

  let size = Math.min(canvas.width / 8, 120);

  octx.fillStyle = "#fff";
  octx.font = `600 ${size}px Inter`;
  octx.textAlign = "center";
  octx.fillText(text, off.width/2, off.height/2);

  const data = octx.getImageData(0,0,off.width,off.height).data;
  let points = [];

  for (let y=0; y<off.height; y+=6) {
    for (let x=0; x<off.width; x+=6) {
      const i = (y*off.width + x)*4;
      if (data[i+3] > 128) {
        points.push({x,y});
      }
    }
  }
  return points;
}

const textPoints = getTextPoints("ShahalGlide");

/* PARTICLES */
let particles = [];

for (let i=0; i<textPoints.length; i++) {
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    tx: textPoints[i].x,
    ty: textPoints[i].y,
    vx: 0,
    vy: 0
  });
}

/* ANIMATION STATES */
let forming = true;

function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p => {

    if (forming) {
      let dx = p.tx - p.x;
      let dy = p.ty - p.y;

      p.vx += dx * 0.01;
      p.vy += dy * 0.01;

      p.vx *= 0.85;
      p.vy *= 0.85;

      p.x += p.vx;
      p.y += p.vy;
    } else {
      // idle subtle motion
      p.x += Math.sin(p.y * 0.01) * 0.2;
      p.y += Math.cos(p.x * 0.01) * 0.2;
    }

    ctx.fillStyle = "rgba(255,255,255,0.8)";
    ctx.fillRect(p.x, p.y, 1.5, 1.5);
  });

  requestAnimationFrame(animate);
}

animate();

/* ---------------- CINEMATIC TIMELINE ---------------- */
const ui = document.getElementById("ui");
const title = document.getElementById("title");
const subtitle = document.getElementById("subtitle");
const progress = document.getElementById("progress");

/* blur intro */
ui.classList.add("blur");

setTimeout(() => {
  ui.classList.remove("blur");
}, 2000);

/* stop forming → settle */
setTimeout(() => {
  forming = false;
  title.classList.add("show");
}, 3000);

/* subtitle */
setTimeout(() => {
  subtitle.classList.add("show");
}, 3800);

/* progress intro */
setTimeout(() => {
  progress.classList.add("show");
}, 4500);

/* idle mode */
setTimeout(() => {
  ui.classList.add("idle");
}, 6000);

</script>

</body>
</html>
