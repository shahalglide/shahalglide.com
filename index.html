<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Launching...</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ---------------- BASE ---------------- */
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  background: #000;
  color: white;
}

/* ---------------- ANIMATED GRADIENT BACKGROUND ---------------- */
.bg {
  position: absolute;
  width: 200%;
  height: 200%;
  background: linear-gradient(
    120deg,
    #ff6a00,
    #ff3cac,
    #784ba0,
    #2b86c5,
    #00c9ff
  );
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;
  filter: blur(80px);
  opacity: 0.6;
}

@keyframes gradientMove {
  0% { transform: translate(0,0); }
  50% { transform: translate(-20%, -20%); }
  100% { transform: translate(0,0); }
}

/* ---------------- LIGHT LINES ---------------- */
canvas {
  position: absolute;
  top:0;
  left:0;
}

/* ---------------- CONTENT ---------------- */
.container {
  position: absolute;
  width:100%;
  top:50%;
  transform: translateY(-50%);
  text-align:center;
  padding: 0 20px;
  z-index: 2;
}

/* TEXT */
.title {
  font-size: clamp(22px, 5vw, 40px);
  font-weight:500;
  letter-spacing: 0.5px;
  opacity:0;
}

.subtitle {
  margin-top:10px;
  font-size: clamp(14px, 3.5vw, 18px);
  color:#ddd;
  opacity:0;
}

/* LOADER */
.loader {
  margin: 40px auto;
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.15);
  position: relative;
  opacity:0;
}

.loader::after {
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  border:2px solid white;
  border-top-color:transparent;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* FOOTER */
.footer {
  position: absolute;
  bottom: 20px;
  width:100%;
  text-align:center;
  font-size: 12px;
  color: rgba(255,255,255,0.4);
}

/* STATES */
.show { opacity:1; transition: all 1.2s ease; }

</style>
</head>

<body>

<div class="bg"></div>
<canvas id="canvas"></canvas>

<div class="container">
  <div class="title" id="title">Under Development</div>
  <div class="subtitle" id="subtitle">A new experience is on its way</div>

  <div class="loader" id="loader"></div>
</div>

<div class="footer">© 2026 ShahalGlide</div>

<script>

/* ---------------- CANVAS LIGHT LINES ---------------- */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let lines = [];

for (let i = 0; i < 30; i++) {
  lines.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    len: Math.random() * 100 + 50,
    speed: Math.random() * 2 + 0.5,
    angle: Math.random() * Math.PI * 2
  });
}

function animateLines() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  lines.forEach(l => {
    ctx.beginPath();
    ctx.moveTo(l.x, l.y);
    ctx.lineTo(
      l.x + Math.cos(l.angle) * l.len,
      l.y + Math.sin(l.angle) * l.len
    );

    ctx.strokeStyle = "rgba(255,255,255,0.08)";
    ctx.lineWidth = 1;
    ctx.stroke();

    l.x += Math.cos(l.angle) * l.speed;
    l.y += Math.sin(l.angle) * l.speed;

    // wrap around screen
    if (l.x > canvas.width) l.x = 0;
    if (l.x < 0) l.x = canvas.width;
    if (l.y > canvas.height) l.y = 0;
    if (l.y < 0) l.y = canvas.height;
  });

  requestAnimationFrame(animateLines);
}

animateLines();

/* ---------------- TIMELINE ---------------- */
const title = document.getElementById("title");
const subtitle = document.getElementById("subtitle");
const loader = document.getElementById("loader");

setTimeout(() => {
  title.classList.add("show");
}, 1000);

setTimeout(() => {
  subtitle.classList.add("show");
}, 2000);

setTimeout(() => {
  loader.classList.add("show");
}, 2800);

</script>

</body>
</html>
