<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shahal Glide | Heavy Development</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Orbitron', sans-serif;
  height:100vh;
  overflow:hidden;
  background:#0f0f0f;
  color:white;
}

/* Animated Gradient Background */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:linear-gradient(
    45deg,
    #ff00cc,
    #3333ff,
    #00ffee,
    #ff9900
  );
  animation: gradientMove 12s ease infinite;
  background-size:400% 400%;
  z-index:-2;
  filter: blur(120px);
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Particle Canvas */
canvas{
  position:absolute;
  top:0;
  left:0;
  z-index:-1;
}

/* Center Content */
.container{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

/* Animated Heading */
h1{
  font-size:3rem;
  letter-spacing:4px;
  text-transform:uppercase;
  animation: glitch 1.5s infinite;
}

@keyframes glitch{
  0%{text-shadow:2px 2px #ff00cc;}
  50%{text-shadow:-2px -2px #00ffee;}
  100%{text-shadow:2px -2px #ff9900;}
}

/* Subtitle */
p{
  margin-top:20px;
  font-size:1.2rem;
  opacity:0.8;
}

/* Animated Loader Bar */
.loader{
  margin-top:40px;
  width:300px;
  height:6px;
  background:rgba(255,255,255,0.1);
  overflow:hidden;
  border-radius:5px;
}

.loader span{
  display:block;
  height:100%;
  width:40%;
  background:linear-gradient(90deg,#ff00cc,#00ffee);
  animation: loading 2s infinite;
}

@keyframes loading{
  0%{transform:translateX(-100%);}
  100%{transform:translateX(300%);}
}

/* Countdown */
.countdown{
  margin-top:30px;
  font-size:1rem;
  opacity:0.7;
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="container">
  <h1>Heavy Development</h1>
  <p>This site is evolving into something futuristic and powerful.</p>

  <div class="loader">
    <span></span>
  </div>

  <div class="countdown" id="countdown"></div>
</div>

<script>
/* Particle Background */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*2,
    speed:Math.random()*0.5+0.2
  });
}

function animateParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";

  particles.forEach(p=>{
    p.y += p.speed;
    if(p.y>canvas.height) p.y=0;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(animateParticles);
}

animateParticles();

/* Countdown (auto 30 days from now) */
let launchDate = new Date();
launchDate.setDate(launchDate.getDate()+30);

function updateCountdown(){
  let now = new Date();
  let diff = launchDate - now;

  let days = Math.floor(diff/(1000*60*60*24));
  let hours = Math.floor((diff/(1000*60*60))%24);
  let minutes = Math.floor((diff/1000/60)%60);
  let seconds = Math.floor((diff/1000)%60);

  document.getElementById("countdown").innerHTML =
    `Launching in ${days}d ${hours}h ${minutes}m ${seconds}s`;

  setTimeout(updateCountdown,1000);
}

updateCountdown();
</script>

</body>
</html>
