<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shahal Glide | Under Heavy Development</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter', sans-serif;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  color:white;
  background:#0f0f1a;
}

/* Animated Gradient Background */
.background{
  position:absolute;
  width:200%;
  height:200%;
  background:radial-gradient(circle at 20% 30%, #ff00cc, transparent 40%),
             radial-gradient(circle at 80% 70%, #00ffee, transparent 40%),
             radial-gradient(circle at 50% 50%, #3333ff, transparent 50%);
  animation:moveBg 20s ease infinite alternate;
  z-index:-2;
  filter: blur(120px);
}

@keyframes moveBg{
  0%{transform:translate(0,0);}
  100%{transform:translate(-10%, -10%);}
}

/* Glass Card */
.card{
  backdrop-filter: blur(25px);
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  padding:50px 40px;
  border-radius:20px;
  text-align:center;
  width:90%;
  max-width:500px;
  box-shadow:0 0 60px rgba(0,255,255,0.15);
  animation:float 6s ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(0px);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0px);}
}

h1{
  font-size:2.5rem;
  font-weight:700;
  margin-bottom:15px;
  background:linear-gradient(90deg,#ff00cc,#00ffee);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:pulse 3s infinite;
}

@keyframes pulse{
  0%{opacity:0.7;}
  50%{opacity:1;}
  100%{opacity:0.7;}
}

p{
  font-weight:300;
  opacity:0.8;
  margin-bottom:30px;
  line-height:1.6;
}

/* Animated Button */
.button{
  display:inline-block;
  padding:12px 30px;
  border-radius:30px;
  background:linear-gradient(90deg,#ff00cc,#00ffee);
  color:white;
  text-decoration:none;
  font-weight:500;
  transition:0.3s ease;
}

.button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(0,255,255,0.6);
}

/* Responsive */
@media(max-width:600px){
  h1{font-size:1.8rem;}
  .card{padding:35px 25px;}
}
</style>
</head>
<body>

<div class="background"></div>

<div class="card">
  <h1>Heavy Development</h1>
  <p>
    Shahal Glide is currently evolving into a futuristic digital experience.
    Something powerful, creative, and refined is coming soon.
  </p>
  <a href="mailto:youremail@domain.com" class="button">Notify Me</a>
</div>

</body>
</html>
