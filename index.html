<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShahalGlide</title>

<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ---------------- BASE ---------------- */
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #000;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  overflow: hidden;
  color: #fff;
}

/* ---------------- BACKGROUND GLOW ---------------- */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 50% 40%, rgba(255,120,80,0.08), transparent 60%);
  filter: blur(40px);
  opacity: 0;
  animation: bgFade 3s ease forwards 1s;
}

@keyframes bgFade {
  to { opacity: 1; }
}

/* ---------------- CANVAS ---------------- */
canvas {
  position: absolute;
  width:100%;
  height:100%;
}

/* ---------------- TEXT ---------------- */
.container {
  position: absolute;
  width:100%;
  top:50%;
  transform: translateY(-50%);
  text-align:center;
  padding: 0 20px;
}

.title {
  font-size: clamp(28px, 6vw, 56px);
  font-weight:600;
  letter-spacing:1.5px;
  opacity:0;
}

.subtitle {
  margin-top:10px;
  font-size: clamp(14px, 3.5vw, 18px);
  color:#9ca3af;
  opacity:0;
}

/* ---------------- PROGRESS ---------------- */
.progress {
  margin: 40px auto 0;
  width: 80px;
  height: 80px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.15);
  position:relative;
  opacity:0;
}

.progress::after {
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  border:1px solid white;
  border-top-color:transparent;
  animation: spin 1.2s linear infinite;
}

.idle .progress::after {
  animation: spinSlow 8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes spinSlow {
  to { transform: rotate(360deg); }
}

/* ---------------- STATES ---------------- */
.blur { filter: blur(10px); }
.show { opacity:1; transition: all 1.2s ease; }

</style>
</head>

<body>

<div class="bg"></div>
<canvas id="canvas"></canvas>

<div class="container" id="ui">
  <div class="title" id="title">ShahalGlide</div>
  <div class="subtitle" id="subtitle">Built to feel right.</div>
  <div class="progress" id="progress"></div>
</div>

<script>

/* ---------------- CANVAS DRAW LINES (TEXT STROKE STYLE) ---------------- */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* Create text path */
function drawTextStroke(progress) {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  let size = Math.min(canvas.width / 7, 120);
  ctx.font = `600 ${size}px -apple-system`;
  ctx.textAlign = "center";

  ctx.strokeStyle = "rgba(255,255,255,0.9)";
  ctx.lineWidth = 1.2;

  // simulate drawing effect
  ctx.setLineDash([1000]);
  ctx.lineDashOffset = 1000 - (progress * 1000);

  ctx.strokeText("ShahalGlide", canvas.width/2, canvas.height/2);
}

let t = 0;
let forming = true;

function animate() {
  if (forming) {
    t += 0.02;
    if (t >= 1) {
      forming = false;
      t = 1;
    }
  }

  drawTextStroke(t);
  requestAnimationFrame(animate);
}
animate();

/* ---------------- TIMELINE ---------------- */
const ui = document.getElementById("ui");
const title = document.getElementById("title");
const subtitle = document.getElementById("subtitle");
const progress = document.getElementById("progress");

/* cinematic blur start */
ui.classList.add("blur");

setTimeout(() => {
  ui.classList.remove("blur");
}, 2000);

/* text reveal */
setTimeout(() => {
  title.classList.add("show");
}, 2500);

/* subtitle */
setTimeout(() => {
  subtitle.classList.add("show");
}, 3200);

/* progress */
setTimeout(() => {
  progress.classList.add("show");
}, 3800);

/* idle */
setTimeout(() => {
  ui.classList.add("idle");
}, 5500);

</script>

</body>
</html>
