<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShahalGlide</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ---------------- BASE ---------------- */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000;
  color: #fff;
  font-family: 'Inter', sans-serif;
  overflow: hidden;
}

/* ---------------- CANVAS (LINES + CINEMATIC) ---------------- */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

/* ---------------- MAIN CONTENT ---------------- */
.container {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 50%;
  transform: translateY(-50%);
  padding: 0 20px;
  opacity: 0;
}

/* TEXTS */
.title {
  font-size: clamp(28px, 6vw, 52px);
  font-weight: 600;
  letter-spacing: 2px;
  opacity: 0;
}

.subtitle {
  margin-top: 12px;
  font-size: clamp(14px, 3.5vw, 18px);
  color: #aaa;
  opacity: 0;
}

/* PROGRESS */
.progress-wrap {
  margin-top: 40px;
  width: 120px;
  height: 120px;
  margin-left: auto;
  margin-right: auto;
  position: relative;
  opacity: 0;
}

.progress-circle {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.1);
  position: absolute;
}

.progress-fill {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 2px solid white;
  border-top-color: transparent;
  animation: spin 1.2s linear infinite;
}

/* IDLE LOOP */
.idle .progress-fill {
  animation: spinSlow 6s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes spinSlow {
  to { transform: rotate(360deg); }
}

/* FADE + BLUR CONTROL */
.blur {
  filter: blur(10px);
}

.show {
  opacity: 1;
  transition: all 1.2s ease;
}

/* RESPONSIVE SAFE SPACING */
@media (max-width: 480px) {
  .progress-wrap {
    width: 90px;
    height: 90px;
  }
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="container" id="main">
  <div class="title" id="title">ShahalGlide</div>
  <div class="subtitle" id="subtitle">Building something that simply works better.</div>

  <div class="progress-wrap" id="progress">
    <div class="progress-circle"></div>
    <div class="progress-fill"></div>
  </div>
</div>

<script>

/* ---------------- CANVAS LINE ANIMATION ---------------- */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let lines = [];

for (let i = 0; i < 25; i++) {
  lines.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    dx: (Math.random() - 0.5) * 4,
    dy: (Math.random() - 0.5) * 4
  });
}

function animateLines() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = "rgba(255,255,255,0.08)";
  ctx.lineWidth = 1;

  lines.forEach(l => {
    ctx.beginPath();
    ctx.moveTo(l.x, l.y);
    ctx.lineTo(l.x + l.dx * 10, l.y + l.dy * 10);
    ctx.stroke();

    l.x += l.dx;
    l.y += l.dy;

    if (l.x < 0 || l.x > canvas.width) l.dx *= -1;
    if (l.y < 0 || l.y > canvas.height) l.dy *= -1;
  });

  requestAnimationFrame(animateLines);
}

animateLines();

/* ---------------- CINEMATIC SEQUENCE ---------------- */
const container = document.getElementById("main");
const title = document.getElementById("title");
const subtitle = document.getElementById("subtitle");
const progress = document.getElementById("progress");

/* Step 1: chaotic blur intro */
setTimeout(() => {
  container.classList.add("show", "blur");
}, 500);

/* Step 2: text reveal */
setTimeout(() => {
  container.classList.remove("blur");
  title.classList.add("show");
}, 2000);

/* Step 3: subtitle */
setTimeout(() => {
  subtitle.classList.add("show");
}, 3000);

/* Step 4: progress intro */
setTimeout(() => {
  progress.classList.add("show");
}, 3800);

/* Step 5: idle transition */
setTimeout(() => {
  container.classList.add("idle");
}, 5500);

/* RESPONSIVE FIX */
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

</script>

</body>
</html>
