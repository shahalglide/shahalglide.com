<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShahalGlide</title>

<style>
/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  background: radial-gradient(circle at top, #0f0f1a, #050508);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  color: white;
}

/* CONTAINER */
.container {
  text-align: center;
  opacity: 0;
  transform: translateY(30px);
  animation: introFade 1.2s ease forwards;
}

/* TITLE */
.title {
  font-size: 2.8rem;
  letter-spacing: 2px;
  background: linear-gradient(90deg, #00f5ff, #ff00c8);
  -webkit-background-clip: text;
  color: transparent;
  animation: glowText 2s ease-in-out infinite alternate;
}

/* SUBTITLE */
.subtitle {
  margin-top: 12px;
  font-size: 1rem;
  color: #aaa;
  opacity: 0;
  animation: fadeIn 2s ease forwards 1s;
}

/* LOADER RING */
.loader {
  margin: 40px auto;
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.1);
  border-top: 3px solid #00f5ff;
  border-right: 3px solid #ff00c8;
  animation: spin 1s linear infinite;
}

/* AFTER INTRO (IDLE STATE) */
.idle .loader {
  animation: slowSpin 6s linear infinite;
}

.idle .title {
  animation: none;
  opacity: 0.9;
}

/* ANIMATIONS */

@keyframes introFade {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes glowText {
  from {
    text-shadow: 0 0 10px #00f5ff;
  }
  to {
    text-shadow: 0 0 20px #ff00c8;
  }
}

@keyframes fadeIn {
  to {
    opacity: 1;
  }
}

@keyframes spin {
  100% {
    transform: rotate(360deg);
  }
}

@keyframes slowSpin {
  100% {
    transform: rotate(360deg);
  }
}
</style>
</head>

<body>

<div class="container" id="main">
  <div class="title">SHAHALGLIDE</div>
  <div class="subtitle">Crafting something extraordinary</div>
  <div class="loader"></div>
</div>

<script>
// After intro → switch to idle mode
setTimeout(() => {
  document.getElementById("main").classList.add("idle");
}, 4000);
</script>

</body>
</html>
