<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shahal Glide | Under Heavy Development</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Space Grotesk', sans-serif;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#0f2027);
  background-size:400% 400%;
  animation:gradientShift 15s ease infinite;
  overflow:hidden;
  color:white;
}

@keyframes gradientShift{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Floating Orbs */
.orb{
  position:absolute;
  border-radius:50%;
  filter:blur(60px);
  opacity:0.6;
  animation:float 10s infinite ease-in-out alternate;
}

.orb1{
  width:300px;
  height:300px;
  background:#ff00cc;
  top:10%;
  left:10%;
}

.orb2{
  width:350px;
  height:350px;
  background:#00ffee;
  bottom:10%;
  right:10%;
  animation-delay:2s;
}

@keyframes float{
  from{transform:translateY(-30px);}
  to{transform:translateY(30px);}
}

/* Glass Card */
.card{
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.08);
  padding:50px 30px;
  border-radius:20px;
  text-align:center;
  width:90%;
  max-width:500px;
  box-shadow:0 20px 50px rgba(0,0,0,0.4);
  animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

h1{
  font-size:2.2rem;
  margin-bottom:15px;
}

p{
  opacity:0.8;
  margin-bottom:30px;
}

/* Progress Ring */
.progress{
  width:120px;
  height:120px;
  margin:0 auto 25px;
  position:relative;
}

.progress svg{
  transform:rotate(-90deg);
}

.progress circle{
  fill:none;
  stroke-width:8;
  stroke-linecap:round;
}

.progress .bg{
  stroke:rgba(255,255,255,0.2);
}

.progress .meter{
  stroke:url(#grad);
  stroke-dasharray:314;
  stroke-dashoffset:314;
  animation:load 4s infinite ease-in-out;
}

@keyframes load{
  0%{stroke-dashoffset:314;}
  50%{stroke-dashoffset:120;}
  100%{stroke-dashoffset:314;}
}

.status{
  font-size:0.9rem;
  opacity:0.7;
}

/* Responsive */
@media(max-width:480px){
  h1{font-size:1.7rem;}
  .card{padding:40px 20px;}
}
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="card">
  <h1>Heavy Development</h1>
  <p>Stay tuned for something extraordinary.</p>

  <div class="progress">
    <svg width="120" height="120">
      <defs>
        <linearGradient id="grad">
          <stop offset="0%" stop-color="#ff00cc"/>
          <stop offset="100%" stop-color="#00ffee"/>
        </linearGradient>
      </defs>
      <circle class="bg" cx="60" cy="60" r="50"></circle>
      <circle class="meter" cx="60" cy="60" r="50"></circle>
    </svg>
  </div>

  <div class="status">©2026 Shahal Glide</div>
</div>

</body>
</html>
